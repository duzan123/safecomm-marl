# SafeComm-VoI Phase 1 默认超参数配置
# 规格参考：docs/superpowers/plans/2026-05-26-safecomm-voi-design.md §2.1

env:
  n_agents: 4
  dt: 0.1
  max_steps: 200
  d_min: 0.5
  R_comm: 5.0
  v_max: 3.0
  a_max: 2.0
  arena_size: 10.0
  formation_type: "circle"
  w_formation: 1.0
  w_success: 5.0
  success_threshold: 0.3
  K_obs_neighbors: 4
  seed: 42

comm:
  k: 4
  schedule_mode: "safety_priority"
  beta: 1.0
  tau_ref: 1.0
  tau_max: 5.0
  v_max_cbf: 3.0

network:
  msg_dim: 64
  hidden_dims: [256, 256]
  H: 2

ppo:
  n_steps: 2048
  n_epochs: 10
  batch_size: 256
  gamma: 0.99
  lam: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  cost_value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5

lr:
  actor: 3.0e-4
  critic: 1.0e-3
  lambda: 0.01

safety:
  budget: 0.1
  lambda_init: 0.0
  lambda_max: 10.0

training:
  total_steps: 1000000
  log_interval: 10
  eval_interval: 50
  eval_episodes: 10
  save_interval: 100
  checkpoint_dir: "checkpoints"
  device: "auto"
  seed: 42
